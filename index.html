<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Cello Tuner</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Home Screen -->
      <div id="screen-home" class="screen">
        <div class="container">
          <div class="calculator-body">
            <div class="led-display">
              <div class="display-text" id="tuner-display">READY.</div>
            </div>
            <div class="calc-panel">
              <div class="tuner-dial">
                <div class="dial-outer">
                  <div class="dial-marks"></div>
                  <div class="dial-inner">
                    <div class="dial-intune-zone"></div>
                    <div class="dial-needle" id="tuner-needle"></div>
                  </div>
                  <div class="dial-indicator"></div>
                </div>
                <div class="dial-labels">
                  <span class="dial-label left">♭</span>
                  <span class="dial-label center"></span>
                  <span class="dial-label right">♯</span>
                </div>
              </div>

              <div class="tuner-info-compact">
                <div class="detected-note" id="detected-note">--</div>
                <div class="tuner-meta">
                  <div class="detected-freq" id="detected-freq">-- Hz</div>
                  <div class="cents-off" id="cents-off">-- cents</div>
                </div>
              </div>

              <button class="tuner-toggle" id="start-tuner">
                <span class="toggle-icon">🎤</span>
                <span class="toggle-text">START TUNER</span>
              </button>
            </div>
            <nav class="bottom-nav">
              <button class="nav-item active" data-nav="home">
                <span class="nav-label">TUNER</span>
              </button>
              <button class="nav-item" data-nav="settings">
                <span class="nav-label">SETUP</span>
              </button>
            </nav>
          </div>
        </div>
      </div>

      <!-- Settings Screen -->
      <div id="screen-settings" class="screen">
        <div class="container">
          <div class="calculator-body">
            <div class="led-display">
              <div class="display-text">THE F-HOLE VIBE TUNER</div>
            </div>
            <div class="calc-panel">
              <h3 class="panel-title">TUNING</h3>
              <div class="setting-item">
                <label
                  for="base-freq"
                  style="margin: 0; font-weight: 400; text-transform: none"
                  >Base Frequency (A4)</label
                >
                <select id="base-freq" class="freq-select-compact">
                  <option value="432">432 Hz</option>
                  <option value="440" selected>440 Hz</option>
                  <option value="442">442 Hz</option>
                  <option value="444">444 Hz</option>
                </select>
              </div>
              <h3 class="panel-title">DEVELOPER</h3>
              <div class="setting-item">
                <span>DEBUG MODE</span>
                <label class="toggle-switch">
                  <input type="checkbox" id="debug-toggle" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <h3 class="panel-title">NOTATION</h3>
              <div class="setting-item">
                <span>NOTE SYSTEM</span>
                <label class="toggle-switch">
                  <span class="toggle-labels">
                    <span class="label-left">C-D-E-F-G</span>
                    <span class="label-right">DO-RE-MI</span>
                  </span>
                  <input type="checkbox" id="notation-toggle" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <h3 class="panel-title">DEVICE INFORMATION</h3>
              <div class="setting-item">
                <span>BRAND</span>
                <span class="value">BLACK</span>
              </div>
              <div class="setting-item">
                <span>MODEL</span>
                <span class="value">BWV 1007</span>
              </div>
              <div class="setting-item">
                <span>STATUS</span>
                <span class="value">READY</span>
              </div>
            </div>
            <nav class="bottom-nav">
              <button class="nav-item" data-nav="home">
                <span class="nav-label">HOME</span>
              </button>
              <button class="nav-item active" data-nav="settings">
                <span class="nav-label">SETUP</span>
              </button>
            </nav>
          </div>
        </div>
      </div>
    </div>

    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
